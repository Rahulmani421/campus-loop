<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
    <div class="container" style="max-width: 700px; margin-top: 2rem;">
        <div class="glass" style="display: flex; flex-direction: column; height: 80vh; overflow: hidden;">
            <!-- Chat Header -->
            <div
                style="padding: 1.5rem; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 1rem;">
                <div style="width: 45px; height: 45px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;"
                    th:text="${#strings.substring(otherUser.fullName,0,1)}">O</div>
                <div>
                    <h3 th:text="${otherUser.fullName}" style="font-size: 1.1rem; margin: 0;">User Name</h3>
                    <div style="font-size: 0.8rem; color: var(--text-muted);">
                        Regarding: <strong th:text="${product.title}">Product Title</strong>
                    </div>
                </div>
            </div>

            <!-- Messages Area -->
            <div
                style="flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; background: #f8fafc;">
                <div th:each="m : ${messages}"
                    th:class="${m.sender.id == me.id ? 'message-outgoing' : 'message-incoming'}"
                    th:style="${m.sender.id == me.id ? 'align-self: flex-end; max-width: 80%;' : 'align-self: flex-start; max-width: 80%;'}">

                    <div
                        th:style="${m.sender.id == me.id ? 'background: var(--primary); color: white; padding: 0.8rem 1.2rem; border-radius: 18px 18px 0 18px;' : 'background: white; color: var(--text-main); padding: 0.8rem 1.2rem; border-radius: 18px 18px 18px 0; border: 1px solid rgba(0,0,0,0.05);'}">
                        <p th:text="${m.content}" style="margin: 0; line-height: 1.4;"></p>
                    </div>
                    <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem;"
                        th:styleappend="${m.sender.id == me.id ? 'text-align: right;' : ''}"
                        th:text="${#temporals.format(m.timestamp, 'HH:mm')}">Time</div>
                </div>
            </div>

            <!-- Input Area -->
            <div style="padding: 1.5rem; background: white; border-top: 1px solid rgba(0,0,0,0.05);">
                <form th:action="@{/messages/send}" method="post" style="display: flex; gap: 0.5rem;">
                    <input type="hidden" name="receiverId" th:value="${otherUser.id}">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <input type="text" name="content" placeholder="Type your message..."
                        style="flex: 1; border: 1px solid #e2e8f0; border-radius: 25px; padding: 0.8rem 1.5rem; outline: none; font-size: 0.95rem;"
                        required>
                    <button type="submit" class="btn btn-primary"
                        style="padding: 0.8rem 1.5rem; border-radius: 25px; font-weight: 700;">Send</button>
                </form>
            </div>
        </div>
    </div>
</div>

</html>
