<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
    <div class="container" style="max-width: 450px; margin-top: 4rem;">
        <div class="glass fade-in" style="padding: 2.5rem;">
            <h2 style="margin-bottom: 2rem; text-align: center;">Welcome Back</h2>

            <div th:if="${param.error}"
                style="background: #fee2e2; color: #b91c1c; padding: 0.8rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem;">
                Invalid username or password.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Sign In</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a th:href="@{/register}"
                    style="color: var(--primary); font-weight: 600;">Register here</a>
            </p>
        </div>
    </div>
</div>

</html>
