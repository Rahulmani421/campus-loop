<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
    <div class="container" style="margin-top: 2rem; max-width: 800px;">
        <h1 style="margin-bottom: 2rem;">Notifications</h1>

        <div th:if="${allNotifications.empty}" class="glass" style="padding: 2rem; text-align: center;">
            <p style="color: var(--text-muted);">No notifications yet. You're all caught up! ✨</p>
        </div>

        <div th:each="notification : ${allNotifications}" class="glass"
            th:style="'padding: 1.5rem; margin-bottom: 1rem;' + (${notification.isRead} ? 'opacity: 0.8;' : 'border-left: 4px solid var(--primary);')">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;">
                <h3 th:text="${notification.title}" style="margin: 0; font-size: 1.1rem;">Notification Title</h3>
                <span th:text="${#temporals.format(notification.createdAt, 'dd MMM, HH:mm')}"
                    style="font-size: 0.8rem; color: var(--text-muted);">Date</span>
            </div>
            <p th:text="${notification.message}" style="margin: 0; color: var(--text-main); line-height: 1.5;">Message
                content goes here.</p>
        </div>
    </div>
</div>

</html>
