<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
    <div class="container" style="max-width: 800px; margin-top: 3rem;">
        <h1 style="margin-bottom: 2rem;">Messages</h1>

        <div th:if="${#lists.isEmpty(messages)}" class="glass"
            style="padding: 3rem; text-align: center; color: var(--text-muted);">
            <div style="font-size: 3rem; margin-bottom: 1rem;">✉️</div>
            <h3>Your inbox is empty</h3>
            <p>When someone messages you about an item, it will show up here.</p>
        </div>

        <div style="display: grid; gap: 1.5rem;">
            <div th:each="msg : ${messages}" class="glass fade-in"
                style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                <div
                    style="display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 1rem;">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;"
                        th:text="${#strings.substring(msg.sender.fullName,0,1)}">S</div>
                    <div>
                        <div style="font-weight: 700;" th:text="${msg.sender.fullName}">Sender Name</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted);"
                            th:text="${#temporals.format(msg.timestamp, 'dd MMM, HH:mm')}">Time</div>
                    </div>
                    <div style="margin-left: auto;">
                        <span
                            style="font-size: 0.8rem; background: #f1f5f9; padding: 0.3rem 0.7rem; border-radius: 12px;"
                            th:text="${msg.relatedProduct.category}">Category</span>
                    </div>
                </div>

                <div>
                    <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.3rem;">Regarding: <strong
                            th:text="${msg.relatedProduct.title}">Product</strong></div>
                    <p th:text="${msg.content}" style="line-height: 1.5;">Message content goes here...</p>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <a th:href="@{/messages/chat(with=${msg.sender.id}, productId=${msg.relatedProduct.id})}"
                        class="btn btn-primary" style="padding: 0.6rem 1.2rem; font-size: 0.9rem;">Chat & Reply</a>
                    <a th:href="@{/products/{id}(id=${msg.relatedProduct.id})}"
                        style="font-size: 0.9rem; color: var(--primary); padding: 0.6rem 0; font-weight: 600;">View
                        Item</a>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
