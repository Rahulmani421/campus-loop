<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
    <div class="container" style="margin-top: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1>Manage Inventory</h1>
            <a th:href="@{/admin/products/add}" class="btn btn-primary">Add New Item</a>
        </div>

        <div th:if="${success}" class="glass"
            style="padding: 1rem; margin-bottom: 1rem; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0;">
            <p th:text="${success}" style="margin:0;"></p>
        </div>

        <div class="glass" style="padding: 2rem;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr
                        style="text-align: left; border-bottom: 1px solid rgba(0,0,0,0.05); color: var(--text-muted); font-size: 0.9rem;">
                        <th style="padding: 1rem;">ID</th>
                        <th style="padding: 1rem;">Product</th>
                        <th style="padding: 1rem;">Seller</th>
                        <th style="padding: 1rem;">Price</th>
                        <th style="padding: 1rem;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}" style="border-bottom: 1px solid rgba(0,0,0,0.02);">
                        <td style="padding: 1rem;" th:text="${product.id}">1</td>
                        <td style="padding: 1rem;">
                            <div style="font-weight: 600;" th:text="${product.title}">Title</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="${product.category}">
                                Category</div>
                        </td>
                        <td style="padding: 1rem;" th:text="${product.seller.fullName}">Seller</td>
                        <td style="padding: 1rem;" th:text="'₹' + ${product.price}">₹0</td>
                        <td style="padding: 1rem;">
                            <form th:action="@{/admin/products/delete/{id}(id=${product.id})}" method="post"
                                onsubmit="return confirm('Are you sure you want to delete this product? The user will be notified.');">
                                <input type="text" name="reason" placeholder="Reason (optional)"
                                    style="padding: 0.3rem; border-radius: 4px; border: 1px solid #ddd; margin-right: 0.5rem; font-size: 0.8rem;">
                                <button type="submit" class="btn"
                                    style="background: #ef4444; color: white; padding: 0.3rem 0.8rem;">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</html>
