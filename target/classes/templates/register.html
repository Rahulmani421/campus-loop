<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="content">
    <div class="container" style="max-width: 550px; margin-top: 4rem;">
        <div class="glass fade-in" style="padding: 2.5rem;">
            <h2 style="margin-bottom: 2rem; text-align: center;">Join CampusLoop</h2>

            <div th:if="${error}"
                style="background: #fee2e2; color: #b91c1c; padding: 0.8rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center;">
                <span th:text="${error}">Error message here</span>
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" th:field="*{username}" class="form-control" placeholder="Choose username"
                            required>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" th:field="*{fullName}" class="form-control" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>College Email (.edu)</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="name@college.edu"
                        required>
                    <small style="color: var(--text-muted)">Must be a valid institutional domain.</small>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" class="form-control"
                        placeholder="Create a strong password" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Hostel Block</label>
                        <input type="text" th:field="*{hostelBlock}" class="form-control" placeholder="e.g. Block A">
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" th:field="*{department}" class="form-control"
                            placeholder="e.g. Computer Science">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 1rem; margin-top: 1rem;">Create Account</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a th:href="@{/login}" style="color: var(--primary); font-weight: 600;">Sign
                    In</a>
            </p>
        </div>
    </div>
</div>

</html>
